<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Freedom Lab NYC links: classes and events, the hackerspace waitlist, and more.">
    <title>Links | Freedom Lab NYC</title>
    <link rel="icon" href="../static/img/torch transparent icocrop2.png" type="image/png">
    <link rel="stylesheet" href="../css/styles.css?v=bcf140a">
    <link rel="preload" href="../static/fonts/press-start-2p-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="../static/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="../css/fonts.css">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://freedomlab.nyc/links/">
    <meta property="og:title" content="Links | Freedom Lab NYC">
    <meta property="og:description" content="Quick links for Freedom Lab NYC: classes and events, waitlist, and more.">
    <meta property="og:image" content="https://freedomlab.nyc/static/img/FL%20Signature%20Rectangular2.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Links | Freedom Lab NYC">
    <meta name="twitter:description" content="Quick links for Freedom Lab NYC: classes and events, waitlist, and more.">
    <meta name="twitter:image" content="https://freedomlab.nyc/static/img/FL%20Signature%20Rectangular2.png">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate">
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">

    <style>
        .links-page {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(50, 208, 17, 0.15), transparent 38%),
                linear-gradient(180deg, #0a0b0a 0%, #0d110d 100%);
        }

        .links-shell {
            width: min(100%, 760px);
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        .links-header {
            display: flex;
            justify-content: center;
            margin-bottom: 2.25rem;
        }

        .links-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .links-logo img {
            width: min(360px, 82vw);
            height: auto;
        }

        .module-stack {
            display: grid;
            gap: 0.9rem;
        }

        .link-module {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            min-height: 4.4rem;
            padding: 1.05rem 1.35rem;
            background: rgba(255, 255, 255, 0.035);
            border: 1.5px solid rgba(50, 208, 17, 0.7);
            border-radius: 10px;
            color: var(--text-primary);
            text-decoration: none;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .link-module:hover,
        .link-module:focus-visible {
            transform: translateY(-1px);
            background: rgba(50, 208, 17, 0.09);
            border-color: #32D011;
            outline: none;
        }

        .link-module::after {
            content: "";
            grid-column: 3;
            width: 1.65rem;
            height: 1px;
            margin-left: 1rem;
        }

        .module-label {
            grid-column: 2;
            justify-self: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            text-align: center;
            font-family: var(--font-body);
            line-height: 1.2;
        }

        .module-title {
            font-size: clamp(1rem, 3vw, 1.15rem);
            font-weight: 700;
        }

        .module-subtitle {
            max-width: 21rem;
            color: var(--text-muted);
            font-size: clamp(0.78rem, 2.4vw, 0.88rem);
            font-weight: 400;
            line-height: 1.3;
        }

        .module-icon {
            grid-column: 1;
            grid-row: 1;
            width: 1.65rem;
            height: 1.65rem;
            color: #fff;
            margin-right: 1rem;
        }

        .module-icon svg,
        .module-icon img {
            display: block;
            width: 100%;
            height: 100%;
        }

        .module-icon svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .links-qr-section {
            margin-top: 2rem;
            text-align: center;
        }

        .links-qr-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(50, 208, 17, 0.7);
            border-radius: 14px;
        }

        .links-qr-card img {
            display: block;
            width: min(220px, 60vw);
            height: auto;
            border-radius: 10px;
        }

        .links-qr-label {
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.82rem;
            line-height: 1.3;
        }

        .sponsors-section {
            margin-top: 3rem;
            padding-top: 0.75rem;
            text-align: center;
        }

        .sponsors-title {
            color: var(--text-muted);
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            margin-bottom: 0.9rem;
            text-transform: uppercase;
        }

        .sponsor-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 0.75rem;
        }

        .sponsor-card {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem 0;
            background: transparent;
            border: 0;
            border-radius: 0;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .sponsor-card:hover,
        .sponsor-card:focus-visible {
            transform: translateY(-1px);
            opacity: 0.9;
            outline: none;
        }

        .sponsor-card img {
            display: block;
            width: min(210px, 58vw);
            max-height: 48px;
            object-fit: contain;
        }

        .sponsor-card--light img {
            background: #fff;
            border-radius: 10px;
            padding: 0.35rem 0.5rem;
        }

        @media (max-width: 640px) {
            .links-shell {
                padding: 1.25rem 1rem 3rem;
            }

            .link-module {
                min-height: 4rem;
                padding: 1rem;
                border-radius: 10px;
            }

            .module-title {
                font-size: 1rem;
            }

            .module-subtitle {
                font-size: 0.76rem;
            }

            .module-icon {
                width: 1.45rem;
                height: 1.45rem;
            }

            .sponsor-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="links-page">
        <div class="links-shell">
            <div class="links-header">
                <a href="/" class="links-logo" aria-label="Freedom Lab NYC home">
                    <picture>
                        <source srcset="../static/img/FLNYC 2LINE+LOGO.webp" type="image/webp">
                        <img src="../static/img/FLNYC 2LINE+LOGO.png" alt="Freedom Lab NYC">
                    </picture>
                </a>
            </div>

            <section class="module-stack" aria-label="Freedom Lab quick links">
                <a class="link-module" href="https://t.me/+OAf7Uz8oxttmNTAx" target="_blank" rel="noopener">
                    <span class="module-label">
                        <span class="module-title">Join the Telegram</span>
                        <span class="module-subtitle">Only available to in person attendees</span>
                    </span>
                    <span class="module-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M21 4.5 3 11.7l6.9 2.2M21 4.5l-4.8 15-6.3-5.6M21 4.5 9.9 13.9m0 0-.2 5 2.9-3.1"/></svg>
                    </span>
                </a>

                <a class="link-module" href="/join/">
                    <span class="module-label">
                        <span class="module-title">Apply for Early Access</span>
                        <span class="module-subtitle">To become a member of our freedom tech coworking and hacker space</span>
                    </span>
                    <span class="module-icon" aria-hidden="true">
                        <img src="../static/img/early-access-icon-white.png" alt="">
                    </span>
                </a>

                <a class="link-module" href="https://luma.com/freedomlab" target="_blank" rel="noopener">
                    <span class="module-label">
                        <span class="module-title">View Upcoming Events</span>
                    </span>
                    <span class="module-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M7 3v3M17 3v3M4.5 8.5h15M6 5h12a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/><path d="M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01"/></svg>
                    </span>
                </a>
            </section>

            <section class="links-qr-section" aria-label="QR code for this page">
                <div class="links-qr-card">
                    <img src="../static/img/links-qr.png" alt="QR code for freedomlab.nyc/links">
                    <div class="links-qr-label">Scan to open freedomlab.nyc/links</div>
                </div>
            </section>

            <section class="sponsors-section" aria-labelledby="sponsors-title">
                <h2 id="sponsors-title" class="sponsors-title">Thank You to Our Sponsor</h2>
                <div class="sponsor-grid">
                    <a class="sponsor-card" href="https://cakewallet.com/" target="_blank" rel="noopener" aria-label="Visit Cake Wallet">
                        <img src="../static/img/sponsors/cake-wallet-wordmark.png" alt="Cake Wallet logo">
                    </a>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../js/footer.js"></script>
    <script src="../js/social-config.js"></script>
</body>
</html>
