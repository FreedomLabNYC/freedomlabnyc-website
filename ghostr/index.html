function constrainLabelLines(lines, maxChars = 13) {
  const out = [];
  lines.forEach(line => {
    const words = line.split(' ');
    let current = '';
    words.forEach(word => {
      const next = current ? `${current} ${word}` : word;
      if (next.length > maxChars && current) {
        out.push(current);
        current = word;
      } else {
        current = next;
      }
    });
    if (current) out.push(current);
  });
  return out;
}

function labelLines(label) {
  const manual = {
    'How to Run a Node': ['How to', 'Run a Node'],
    'How to Get Involved in the Bitcoin Space': ['Get Involved', 'in the Bitcoin Space'],
    'How to Set up a Hardware Wallet': ['Set up a', 'Hardware Wallet'],
    'Secure Your Hardware Wallet': ['Secure Your', 'Hardware Wallet'],
    'How Bitcoin Works as a Ledger': ['How Bitcoin Works', 'as a Ledger'],
    'Grassroots Aid for Myanmar': ['Grassroots Aid', 'for Myanmar'],
    'How to Mine Bitcoin': ['How to', 'Mine Bitcoin'],
    'How to Run a Bitcoin Node': ['How to Run', 'a Bitcoin Node'],
    'How to Buy Bitcoin P2P': ['How to Buy', 'Bitcoin P2P'],
    'Office Hours: How to Run a Node': ['Office Hours:', 'Run a Node'],
    'How to Build a Hardware Wallet': ['How to Build', 'a Hardware Wallet'],
    'Office Hours: Bitcoin Hardware Support': ['Office Hours:', 'Bitcoin Hardware', 'Support'],
    'Intro to Bitcoin and Mining': ['Intro to Bitcoin', 'and Mining'],
    'Bitcoin Game Night': ['Bitcoin', 'Game Night'],
    'New Year\'s Brainstorming': ['New Year\'s', 'Brainstorming'],
    'OpenClaw Show and Tell I': ['OpenClaw Show', 'and Tell I'],
    'OpenClaw Show and Tell II': ['OpenClaw Show', 'and Tell II'],
    'OpenClaw Show and Tell III': ['OpenClaw Show', 'and Tell III'],
  };
  if (manual[label]) return constrainLabelLines(manual[label]);
  const words = label.split(' ');
  if (words.length <= 3) return constrainLabelLines([label]);
  const lines = words.length >= 7 ? 3 : 2;
  const perLine = Math.ceil(words.length / lines);
  return constrainLabelLines(Array.from({length: lines}, (_, i) => words.slice(i * perLine, (i + 1) * perLine).join(' ')).filter(Boolean));
}

function axisCeil(value) {
  const padded = Math.max(1, value * 1.10);
  const exponent = Math.floor(Math.log10(padded));
  const magnitude = Math.pow(10, exponent);
  const normalized = padded / magnitude;
  const niceSteps = [1, 1.5, 2, 2.5, 3, 4, 5, 7.5, 10];
  const step = niceSteps.find(candidate => candidate >= normalized) || 10;
  return step * magnitude;
}

    grid += `<line x1="${left}" y1="${y}" x2="${right}" y2="${y}" stroke="var(--grid)" stroke-width="1" />`;
    grid += `<text x="${left-12}" y="${y+4}" text-anchor="end" fill="var(--rsvp)" opacity="0.72" font-size="11" font-family="JetBrains Mono, monospace">${Math.round(rsvpValue).toLocaleString()}</text>`;
    grid += `<text x="${right+12}" y="${y+4}" text-anchor="start" fill="var(--revenue)" opacity="0.78" font-size="11" font-family="JetBrains Mono, monospace">$${Math.round(revenueValue).toLocaleString()}</text>`;
  }
  grid += `<text x="${left}" y="${chartTop-8}" text-anchor="start" fill="var(--rsvp)" opacity="0.75" font-size="11" font-family="JetBrains Mono, monospace">RSVPs</text>`;
  grid += `<text x="${right}" y="${chartTop-8}" text-anchor="end" fill="var(--revenue)" opacity="0.78" font-size="11" font-family="JetBrains Mono, monospace">Revenue</text>`;

  let sections = '';
  let bars = '';
  let labels = '';
  const categoryKeyRows = [
    ['Bitcoin', 'rgba(255, 132, 36, 0.060)', 'rgba(255, 132, 36, 0.16)'],
    ['AI', 'rgba(255, 238, 92, 0.050)', 'rgba(255, 238, 92, 0.14)'],
    ['Freedom Lab General', 'rgba(50, 208, 17, 0.055)', 'rgba(50, 208, 17, 0.15)'],
  ];
  const categoryKey = categoryKeyRows.map(([name, fill, stroke], index) => {
    const keyX = width - 330;
    const longestTitleLineCount = Math.max(...rows.map(row => labelLines(row.label).length));
    const labelBlockBottom = chartBottom + 47 + (longestTitleLineCount - 1) * 15 + 24;
    const shadedColumnBottom = chartBottom + 144;
    const keyRowGap = 34;
    const keyHeight = (categoryKeyRows.length - 1) * keyRowGap + 28;
    const labelSafeBottom = height - 24;
    const keyTop = Math.min(Math.max(labelBlockBottom, shadedColumnBottom) + 42, labelSafeBottom - keyHeight);
    const y = keyTop + index * keyRowGap;
    return `<g><rect x="${keyX}" y="${y - 18}" width="28" height="28" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="2" />` +
      `<text x="${keyX + 40}" y="${y + 3}" fill="var(--muted)" font-size="15" font-weight="560">${name}</text></g>`;
  }).join('');
  rows.forEach((r, i) => {
    const groupX = left + i * groupW;
    const gx = groupX + groupW / 2;
    const category = categoryStyle(r.category, i);
    sections += `<rect x="${groupX + 3}" y="${chartTop}" width="${groupW - 6}" height="${chartBottom - chartTop + 144}" rx="12" fill="${category.shade}" stroke="${category.stroke}" stroke-width="1" />`;

    const totalBarWidth = shownKeys.reduce((sum, k) => sum + k.w, 0) + 8 * (shownKeys.length - 1);
    let x = gx - totalBarWidth / 2;
    shownKeys.forEach(k => {
      const missing = r[k.key] === null || r[k.key] === undefined;
      if (missing) {
        bars += `<text class="bar" data-event="${escapeXml(r.label)}" data-key="${k.key}" data-label="${k.label}" data-value="missing" x="${x + k.w / 2}" y="${chartBottom - 8}" text-anchor="middle" fill="${k.color}" font-size="15" font-weight="700" opacity="0.95">?</text>`;
        x += k.w + 8;
        return;
      }
      const value = r[k.key] || 0;
      const stackValue = k.key === 'rsvp' ? (r.lumaWaitlist || 0) : k.key === 'revenue' ? (r.sponsor || 0) : 0;
      const bucketTotalForEvent = rsvpBucketOrder.reduce((sum, bucket) => sum + (Number((r.rsvpBuckets || {})[bucket]) || 0), 0);
      const baseValue = k.key === 'revenue' ? (r.ticket || 0) : value;
      const stackedValue = baseValue + stackValue;
      const isZero = stackedValue === 0;
      const baseH = isZero ? 4 : (baseValue / axisMaxes[k.key]) * chartHeight;
      const stackH = stackValue ? (stackValue / axisMaxes[k.key]) * chartHeight : 0;
      const totalH = Math.max(isZero ? 4 : 0, baseH + stackH);
      const y = chartBottom - totalH;
      const opacity = isZero ? 0.46 : 0.92;
      if (k.key === 'rsvp' && showRsvpBreakdown && bucketTotalForEvent > 0 && !isZero) {
        const clipId = `clip-${i}-${k.key}-breakdown`;
        bars += `<clipPath id="${clipId}"><rect x="${x}" y="${y}" width="${k.w}" height="${totalH}" rx="5" /></clipPath>`;
        bars += `<g clip-path="url(#${clipId})">`;
        let cursorY = chartBottom;
        const buckets = r.rsvpBuckets || {};
        const bucketTotal = rsvpBucketOrder.reduce((sum, bucket) => sum + (Number(buckets[bucket]) || 0), 0);
        const scale = bucketTotal > 0 ? baseValue / bucketTotal : 1;
        rsvpBucketOrder.forEach(bucket => {
          const bucketCount = Number(buckets[bucket]) || 0;
          if (!bucketCount) return;
          const adjustedCount = bucketCount * scale;
          const h = Math.max(2, (adjustedCount / axisMaxes[k.key]) * chartHeight);
          cursorY -= h;
          const label = bucket === '1' ? 'First-time RSVPers' : `${bucket} RSVP attendees`;
          bars += `<rect class="bar" data-event-index="${i}" data-rsvp-bucket="${escapeXml(bucket)}" data-event="${escapeXml(r.label)}" data-key="rsvpBucket" data-label="${label}" data-value="${bucketCount}" x="${x}" y="${cursorY}" width="${k.w}" height="${h}" fill="${rsvpBucketColors[bucket]}" opacity="0.96" />`;
        });
        if (stackH > 0) {
          bars += `<rect class="bar" data-event-index="${i}" data-rsvp-bucket="Waitlist" data-event="${escapeXml(r.label)}" data-key="lumaWaitlist" data-label="Luma Waitlist" data-value="${stackValue}" x="${x}" y="${y}" width="${k.w}" height="${stackH}" fill="url(#lumaWaitlistPattern)" stroke="rgba(255,255,255,0.72)" stroke-width="1.2" opacity="0.98" />`;
          bars += `<line x1="${x}" x2="${x + k.w}" y1="${chartBottom - baseH}" y2="${chartBottom - baseH}" stroke="#08090a" stroke-width="2" opacity="0.9" />`;
        }
        bars += `</g>`;
      } else if (stackH > 0) {
        const clipId = `clip-${i}-${k.key}`;
        const stackKey = k.key === 'revenue' ? 'sponsorRevenue' : 'lumaWaitlist';
        const stackLabel = k.key === 'revenue' ? 'Sponsor Revenue' : 'Luma Waitlist';
        const stackColor = k.key === 'revenue' ? 'var(--sponsor-revenue)' : 'url(#lumaWaitlistPattern)';
        const stackStroke = k.key === 'revenue' ? 'none' : 'rgba(255,255,255,0.72)';
        const baseKey = k.key === 'revenue' ? 'ticketRevenue' : k.key;
        const baseLabel = k.key === 'revenue' ? 'Ticket Revenue' : k.label;
        bars += `<clipPath id="${clipId}"><rect x="${x}" y="${y}" width="${k.w}" height="${totalH}" rx="5" /></clipPath>`;
        bars += `<g clip-path="url(#${clipId})">`;
        bars += `<rect class="bar" data-event="${escapeXml(r.label)}" data-key="${baseKey}" data-label="${baseLabel}" data-value="${baseValue}" x="${x}" y="${chartBottom - baseH}" width="${k.w}" height="${baseH}" fill="${k.color}" opacity="${opacity}" />`;
        bars += `<rect class="bar" data-event-index="${i}" data-rsvp-bucket="${k.key === 'rsvp' ? 'Waitlist' : ''}" data-event="${escapeXml(r.label)}" data-key="${stackKey}" data-label="${stackLabel}" data-value="${stackValue}" x="${x}" y="${y}" width="${k.w}" height="${stackH}" fill="${stackColor}" stroke="${stackStroke}" stroke-width="${k.key === 'revenue' ? 0 : 1.2}" opacity="0.96" />`;
        bars += `<line x1="${x}" x2="${x + k.w}" y1="${chartBottom - baseH}" y2="${chartBottom - baseH}" stroke="#08090a" stroke-width="2" opacity="0.9" />`;
        bars += `</g>`;
      } else {
        bars += `<rect class="bar" data-event="${escapeXml(r.label)}" data-key="${k.key}" data-label="${k.label}" data-value="${value}" x="${x}" y="${chartBottom - totalH}" width="${k.w}" height="${totalH}" rx="${isZero ? 2 : 5}" fill="${k.color}" opacity="${opacity}" />`;
      }
      x += k.w + 8;
    });

    const labelX = gx;
    const labelY = chartBottom + 47;
    const lineSvg = labelLines(r.label)
      .map((line, index) => `<tspan x="0" dy="${index === 0 ? 0 : 15}">${escapeXml(line)}</tspan>`)

    labels += r.manageUrl ? `<a href="${escapeXml(r.manageUrl)}" target="_blank" rel="noopener noreferrer">${title}</a>` : title;
  });

  document.getElementById('chart').innerHTML = `
    <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Grouped bar chart by event with per-metric scaling and adaptive y-axis labels">
      <defs>
        <pattern id="lumaWaitlistPattern" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <rect width="7" height="7" fill="rgba(216,209,255,0.18)" />

        </pattern>
      </defs>
      ${grid}
      ${sections}
      ${bars}
      ${labels}
      ${categoryKey}

}
function eventRsvpDetailHtml(eventIndex, clickedBucket) {
  const event = events[Number(eventIndex)];
  if (!event) return '';
  const peopleByBucket = event.rsvpPeople || {};
  const buckets = ['6+', '4–5', '3', '2', '1', 'Waitlist'];
  let total = 0;
  const sections = buckets.map(bucket => {
    const people = sortAttendees((peopleByBucket[bucket] || []).filter(Boolean));
    total += people.length;
    const isWaitlist = bucket === 'Waitlist';
    const displayBucket = isWaitlist ? 'Luma Waitlist' : bucketLabel(bucket);
    const noun = isWaitlist ? 'waitlisted' : (bucket === '1' ? 'RSVP' : 'RSVPs');
    const selected = bucket === clickedBucket ? ' · selected' : '';
    return `<div class="attendee-section-title">${displayBucket} ${noun} · ${people.length} people${selected}</div>${people.length ? attendeeColumns(people) : '<div class="attendee-person">No people in this bucket</div>'}`;
  }).join('');
  return `<strong>${escapeXml(event.label)}</strong> · RSVP frequency breakdown<div class="attendee-list" style="margin-top:10px"><div class="attendee-section-title">Total · ${total} people</div>${sections}</div>`;
}

function attachInteractions() {
  document.querySelectorAll('.metric-toggle').forEach(button => {
    button.classList.toggle('active', enabledMetrics.has(button.dataset.key));
    button.onclick = () => {
      if (enabledMetrics.has(button.dataset.key)) {
        if (enabledMetrics.size > 1) enabledMetrics.delete(button.dataset.key);
      } else {
        enabledMetrics.add(button.dataset.key);
      }
      renderChart(events);
    };
    button.ondblclick = () => {
      enabledMetrics = new Set([button.dataset.key]);
      renderChart(events);
    };
  });
  const breakdownToggle = document.getElementById('rsvpBreakdownToggle');
  if (breakdownToggle) {
    breakdownToggle.classList.toggle('active', showRsvpBreakdown);
    breakdownToggle.onclick = () => {
      showRsvpBreakdown = !showRsvpBreakdown;
      localStorage.setItem('freedomLabShowRsvpBreakdown', showRsvpBreakdown ? '1' : '0');
      renderChart(events);
    };
  }
  document.querySelectorAll('.bar').forEach(bar => {
    bar.addEventListener('click', () => {
      if (bar.dataset.value === 'missing') {
        document.getElementById('metricDetail').innerHTML = `<strong>${bar.dataset.event}</strong> · ${bar.dataset.label}: missing structured count`;
        return;
      }
      if ((bar.dataset.key === 'rsvpBucket' || bar.dataset.key === 'lumaWaitlist') && bar.dataset.eventIndex) {
        document.getElementById('metricDetail').innerHTML = eventRsvpDetailHtml(bar.dataset.eventIndex, bar.dataset.rsvpBucket);
        return;
      }
      const value = Number(bar.dataset.value || 0);
      document.getElementById('metricDetail').innerHTML = `<strong>${bar.dataset.event}</strong> · ${bar.dataset.label}: ${metricValueLabel(bar.dataset.key, value)}`;
    });
  });
}

}

function polar(cx, cy, radius, angle) {
  return {x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle)};
}

function donutSegment(cx, cy, outerR, innerR, startAngle, endAngle) {
  const large = endAngle - startAngle > Math.PI ? 1 : 0;
  const p0 = polar(cx, cy, outerR, startAngle);
  const p1 = polar(cx, cy, outerR, endAngle);
  const p2 = polar(cx, cy, innerR, endAngle);
  const p3 = polar(cx, cy, innerR, startAngle);
  return `M ${p0.x} ${p0.y} A ${outerR} ${outerR} 0 ${large} 1 ${p1.x} ${p1.y} L ${p2.x} ${p2.y} A ${innerR} ${innerR} 0 ${large} 0 ${p3.x} ${p3.y} Z`;
}

function maxApprovedCount() {
  return Math.max(...attendeePeople.map(p => Number(p.approved_count) || 0));
}

function bucketLabel(bucket) {
  return bucket === '6+' ? `6–${maxApprovedCount()}` : bucket;
}

function renderRsvpFrequency(width = 1880, height = 720) {
  const cx = 520, cy = 350, outerR = 230, innerR = 126;
  const buckets = attendeeBuckets();
  const total = buckets.reduce((sum, b) => sum + b.people, 0);
  let angle = -Math.PI / 2;
  let segments = '';
  let labels = '';
  buckets.forEach((b) => {
    const frac = b.people / total;
    const next = angle + frac * Math.PI * 2;
    segments += `<path class="bar attendee-segment" data-bucket="${b.bucket}" data-event="Attendee Metrics" data-key="attendeeBucket" data-label="${b.bucket} RSVPs" data-value="${b.people}" d="${donutSegment(cx, cy, outerR, innerR, angle, next)}" fill="${b.color}" opacity="0.98" stroke="#08090a" stroke-width="5" />`;
    const mid = (angle + next) / 2;
    const p = polar(cx, cy, outerR + 32, mid);
    labels += `<text x="${p.x}" y="${p.y - 6}" text-anchor="middle" fill="var(--text)" font-family="JetBrains Mono, monospace" font-size="14" font-weight="800">${Math.round(frac * 100)}%</text>`;
    labels += `<text x="${p.x}" y="${p.y + 13}" text-anchor="middle" fill="var(--muted)" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700">${b.people}</text>`;
    angle = next;
  });
  let legend = '';
  [...buckets].reverse().forEach((b, i) => {
    const y = 190 + i * 62;
    const pct = Math.round((b.people / total) * 100);
    const displayBucket = bucketLabel(b.bucket);
    const noun = b.bucket === '1' ? 'RSVP' : 'RSVPs';
    legend += `<g class="attendee-legend-item" data-bucket="${b.bucket}" tabindex="0" role="button" aria-label="Show ${displayBucket} ${noun} attendees">`;
    legend += `<rect x="930" y="${y - 20}" width="24" height="24" rx="7" fill="${b.color}" opacity="0.98" />`;
    legend += `<text x="970" y="${y}" fill="var(--text)" font-size="21" font-weight="560">${displayBucket} ${noun}</text>`;
    legend += `<text x="970" y="${y + 25}" fill="var(--muted)" font-family="JetBrains Mono, monospace" font-size="15">${b.people} people · ${pct}%</text>`;
    legend += `</g>`;
  });
  document.getElementById('attendeeChart').innerHTML = `
    <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Donut chart of attendee RSVP frequency buckets">
      ${segments}
      ${labels}
      <g class="attendee-total-hit" tabindex="0" role="button" aria-label="Show all attendees">
        <circle cx="${cx}" cy="${cy}" r="${innerR - 6}" fill="transparent" />
        <text x="${cx}" y="${cy - 7}" text-anchor="middle" fill="var(--text)" font-size="52" font-weight="650">${total}</text>
        <text x="${cx}" y="${cy + 30}" text-anchor="middle" fill="var(--muted)" font-size="16">people</text>
      </g>
      ${legend}
    </svg>`;
}

function categoryPeopleForSelection(selection) {
  if (!selection || !selection.categories) return [];
  return attendeePeople.filter(p => {
    const personCategories = p.categories || [];
    const categories = new Set(personCategories);
    const hasSelection = selection.categories.every(category => categories.has(category));
    if (!hasSelection) return false;
    if (!selection.exact) return true;
    return personCategories.length === selection.categories.length;
  });
}

function mergeCanonicalPeople(people) {
  const emailToGroup = new Map();
  canonicalAttendeeGroups.forEach(group => group.emails.forEach(email => emailToGroup.set(email.toLowerCase(), group)));
  const grouped = new Map();
  const output = [];
  people.forEach(person => {
    const group = emailToGroup.get((person.email || '').toLowerCase());
    if (!group) {
      output.push(person);
      return;
    }
    if (!grouped.has(group.name)) {
      const merged = {...person, name: group.name, emails: [], aliases: group.aliases || [], approved_count: 0, categories: []};
      grouped.set(group.name, merged);
      output.push(merged);
    }
    const merged = grouped.get(group.name);
    if (person.email && !merged.emails.includes(person.email)) merged.emails.push(person.email);
    (group.emails || []).forEach(email => { if (email && !merged.emails.includes(email)) merged.emails.push(email); });
    if (!merged.email) merged.email = person.email;
    merged.approved_count = Math.max(merged.approved_count || 0, person.approved_count || 0);
    merged.categories = Array.from(new Set([...(merged.categories || []), ...(person.categories || [])]));
  });
  output.forEach(person => {
    if (person.emails && person.emails.length) { person.allEmails = [...person.emails]; person.email = person.emails[person.emails.length - 1]; }
  });
  return output;
}

function prospectEmailKeys(person) {
  return [person.email || '', ...(person.allEmails || [])]
    .flatMap(value => String(value).split('/'))
    .map(value => value.trim().toLowerCase())
    .filter(value => value.includes('@'));
}

function mergeProspectSources(manualProspects, sheetProspects) {
  const mergedByEmail = new Map();
  const merged = [];
  function upsert(person) {
    const keys = prospectEmailKeys(person);
    const existing = keys.map(key => mergedByEmail.get(key)).find(Boolean);
    if (!existing) {
      const copy = {...person, prospectSections:[...(person.prospectSections || [])], categories:[...(person.categories || [])]};
      merged.push(copy);
      keys.forEach(key => mergedByEmail.set(key, copy));
      return;
    }
    existing.prospectSections = Array.from(new Set([...(existing.prospectSections || []), ...(person.prospectSections || [])]));
    existing.categories = Array.from(new Set([...(existing.categories || []), ...(person.categories || [])]));
    existing.approved_count = Math.max(existing.approved_count || 0, person.approved_count || 0);
    if (!existing.source && person.source) existing.source = person.source;
    if (person.monthlyBudget != null) existing.monthlyBudget = person.monthlyBudget;
    keys.forEach(key => mergedByEmail.set(key, existing));
  }
  manualProspects.forEach(upsert);
  sheetProspects.forEach(upsert);
  return merged;
}

function hydrateProspectsFromAttendees(prospects, attendees) {
  const attendeeByEmail = new Map();
  attendees.forEach(person => prospectEmailKeys(person).forEach(email => attendeeByEmail.set(email, person)));
  return prospects.map(prospect => {
    const matches = prospectEmailKeys(prospect).map(email => attendeeByEmail.get(email)).filter(Boolean);
    if (!matches.length) return prospect;
    const approved_count = Math.max(prospect.approved_count || 0, ...matches.map(person => person.approved_count || 0));
    const categories = Array.from(new Set([...(prospect.categories || []), ...matches.flatMap(person => person.categories || [])]));
    return {...prospect, approved_count, categories};
  });
}

function sortAttendees(people) {
  return [...people].sort((a, b) => {
    return b.approved_count - a.approved_count || a.name.localeCompare(b.name);
  });
}

function attendeeMatchesSearch(person) {
  const q = attendeeSearchQuery.trim().toLowerCase();
  if (!q) return true;
  return (person.name || '').toLowerCase().includes(q) || (person.email || '').toLowerCase().includes(q) || (person.aliases || []).some(alias => alias.toLowerCase().includes(q));
}

function attendeeRow(person) {
  const classes = ['attendee-person', categoryClass(person), (person.current_luma_member === false && !(person.organizer || isOrganizer(person))) ? 'former-member' : '', (person.organizer || isOrganizer(person)) ? 'organizer' : ''].filter(Boolean).join(' ');
  const visibleAliases = (person.aliases || []).filter(alias => !(person.name || '').toLowerCase().includes(alias.toLowerCase()));
  const aliasText = visibleAliases.length ? ` (${escapeXml(visibleAliases.join(', '))})` : '';
  const sheetMaybeMarker = person.source === 'waitlist_sheet' && (person.prospectSections || []).includes('maybe') && Number(person.monthlyBudget) < 60 ? '*' : '';
  return `<div class="${classes}"><strong>${escapeXml(person.name || '(no name)')}${sheetMaybeMarker}</strong>${aliasText} · ${person.approved_count} RSVP${person.approved_count === 1 ? '' : 's'}</div>`;
}

function attendeeColumns(people, columnCount = 3) {
  const rowsPerColumn = Math.ceil(people.length / columnCount) || 1;
  const columns = Array.from({length: columnCount}, (_, index) => people.slice(index * rowsPerColumn, (index + 1) * rowsPerColumn));
  return `<div class="attendee-list-columns">${columns.map(column => `<div class="attendee-list-column">${column.map(attendeeRow).join('')}</div>`).join('')}</div>`;
}

function categoryLegend(people) {
  const keys = [
    ['cat-bitcoin', 'bitcoin', 'Bitcoin'],
    ['cat-ai', 'ai', 'AI'],
    ['cat-freedom', 'freedom', 'Freedom Lab General'],
    ['cat-bitcoin-ai', 'bitcoin-ai', ''],
    ['cat-bitcoin-freedom', 'bitcoin-freedom', ''],
    ['cat-ai-freedom', 'ai-freedom', ''],
    ['cat-all', 'all', ''],
  ];
  const total = Math.max(people.length, 1);
  return keys.map(([cls, swatch, label]) => {
    const count = people.filter(p => categoryClass(p) === cls).length;
    if (!count) return '';
    const pct = Math.round((count / total) * 100);
    const labelText = label ? `${label} · ` : '';
    return `<span><i class="cat-swatch ${swatch}"></i>${labelText}${count} people · ${pct}%</span>`;
  }).join('');
}

function waitlistSignupMatchesSearch(row) {

  return [row.date, row.name, row.email, row.monthlyBudget, row.updatesOptIn, row.membershipInterest, row.freedomTechTools].some(value => String(value || '').toLowerCase().includes(q));

    const mergedProspects = mergeProspectSources(waitlistProspects, waitlistSheetProspects);
    const hydratedProspects = hydrateProspectsFromAttendees(mergedProspects, attendeePeople);
    const prospects = sortAttendees(hydratedProspects.filter(attendeeMatchesSearch));
    const waitlistSectionKeys = ['solid', 'maybe'];
    const isWaitlistProspect = person => (person.prospectSections || []).some(section => waitlistSectionKeys.includes(section));
    const visibleWaitlistProspects = prospects.filter(isWaitlistProspect).length;
    const totalWaitlistProspects = hydratedProspects.filter(isWaitlistProspect).length;
    const sectionHtml = prospectSectionLabels.map(([key, label]) => {
      const sectionPeople = prospects.filter(person => (person.prospectSections || []).includes(key));
      if (!sectionPeople.length) return '';
      return `<h3 class="attendee-section-title">${label} · ${sectionPeople.length}</h3>${attendeeColumns(sectionPeople)}`;
    }).join('');
    document.getElementById('attendeeDetail').innerHTML = `<h2>Waitlist Prospects · ${visibleWaitlistProspects} of ${totalWaitlistProspects} prospects</h2><div class="attendee-list">${sectionHtml}</div>`;
  } else {
    document.getElementById('attendeeDetail').innerHTML = `<h2>${title}</h2><div class="attendee-list">${body}</div>`;
  }
  const input = document.getElementById('attendeeSearch');
  input.addEventListener('input', () => {
    attendeeSearchQuery = input.value;
    renderActiveAttendeeDetail();
    const nextInput = document.getElementById('attendeeSearch');
    nextInput.focus();
    nextInput.setSelectionRange(nextInput.value.length, nextInput.value.length);
  });
  document.querySelectorAll('[data-detail-view]').forEach(button => {
    button.addEventListener('click', () => {
      attendeeDetailView = button.dataset.detailView;
      renderActiveAttendeeDetail();
    });
  });
}

function renderActiveAttendeeDetail() {
  const buckets = [...attendeeBuckets()].reverse();
  if (activeAttendeeMode.type === 'all') {
    let visibleTotal = 0;
    const sections = buckets.map(b => {
      const people = sortAttendees(attendeePeople.filter(p => bucketForCount(p.approved_count) === b.bucket && attendeeMatchesSearch(p)));
      visibleTotal += people.length;
      const displayBucket = bucketLabel(b.bucket);
      const noun = b.bucket === '1' ? 'RSVP' : 'RSVPs';
      return `<div class="attendee-section-title">${displayBucket} ${noun} · ${people.length} people</div>${attendeeColumns(people)}`;
    }).join('');
    detailShell(`All attendees · ${visibleTotal} of ${attendeePeople.length} people`, sections, attendeePeople.filter(attendeeMatchesSearch));
    return;
  }
  if (activeAttendeeMode.type === 'category') {
    const selections = {
      bitcoin: { label: 'Bitcoin', categories: ['Bitcoin'] },
      ai: { label: 'AI', categories: ['AI'] },
      freedom: { label: 'Freedom Lab General', categories: ['Freedom Lab General'] },
      'bitcoin-ai': { label: 'Bitcoin + AI only', categories: ['Bitcoin', 'AI'], exact: true },
      'bitcoin-freedom': { label: 'Bitcoin + Freedom Lab General only', categories: ['Bitcoin', 'Freedom Lab General'], exact: true },
      'ai-freedom': { label: 'AI + Freedom Lab General only', categories: ['AI', 'Freedom Lab General'], exact: true },
      all: { label: 'Bitcoin + AI + Freedom Lab General', categories: ['Bitcoin', 'AI', 'Freedom Lab General'], exact: true },
    };
    const selection = selections[activeAttendeeMode.selection];
    const allPeople = categoryPeopleForSelection(selection);
    let visibleTotal = 0;
    const sections = buckets.map(b => {
      const people = sortAttendees(allPeople.filter(p => bucketForCount(p.approved_count) === b.bucket && attendeeMatchesSearch(p)));
      visibleTotal += people.length;
      const displayBucket = bucketLabel(b.bucket);
      const noun = b.bucket === '1' ? 'RSVP' : 'RSVPs';
      return people.length ? `<div class="attendee-section-title">${displayBucket} ${noun} · ${people.length} people</div>${attendeeColumns(people)}` : '';
    }).join('');
    detailShell(`${selection.label} · ${visibleTotal} of ${allPeople.length} people`, sections || '<div class="attendee-section-title">No matching attendees</div>', allPeople.filter(attendeeMatchesSearch));
    return;
  }
  const bucket = activeAttendeeMode.bucket;
  const allPeople = attendeePeople.filter(p => bucketForCount(p.approved_count) === bucket);
  const people = sortAttendees(allPeople.filter(attendeeMatchesSearch));
  const displayBucket = bucketLabel(bucket);
  const noun = bucket === '1' ? 'RSVP' : 'RSVPs';
  detailShell(`${displayBucket} ${noun} · ${people.length} of ${allPeople.length} people`, attendeeColumns(people), people);
}

const promotionPlatforms = {
  AI: [],
  Bitcoin: [],
  'Freedom Lab General': []
};
let selectedPromotionEventKey = localStorage.getItem('freedomLabPromotionEventKey') || '';
let selectedPromotionCategory = localStorage.getItem('freedomLabPromotionCategory') || '';
function parseEventDateValue(event) {
  const parsed = new Date(`${event.date}T12:00:00`);
  return Number.isNaN(parsed.getTime()) ? 0 : parsed.getTime();
}
function upcomingPromotionEvents() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return events
    .filter(event => parseEventDateValue(event) >= today.getTime())
    .sort((a, b) => parseEventDateValue(b) - parseEventDateValue(a))
    .slice(0, 2);
}
function promotionEventKey(event) {
  return event.manageUrl || `${event.date}:${event.label}`;
}
function promotionStorageKey(event, category, platformId, field) {
  return `freedomLabPromotion:${promotionEventKey(event)}:${category}:${platformId}:${field}`;
}
function promotionCategoriesForEvent(event) {
  const categories = new Set();
  if (event && event.category) categories.add(event.category);
  if (event && event.category === 'Bitcoin') categories.add('AI');
  if (!categories.size) categories.add('Freedom Lab General');
  return [...categories].filter(category => Object.prototype.hasOwnProperty.call(promotionPlatforms, category));
}
function renderPromotionDashboard() {
  const container = document.getElementById('promotionDashboard');
  if (!container) return;
  const promotionEvents = upcomingPromotionEvents();
  if (!promotionEvents.length) {
    container.innerHTML = '<div class="promotion-empty">No upcoming events found.</div>';
    return;
  }
  let event = promotionEvents.find(ev => promotionEventKey(ev) === selectedPromotionEventKey) || promotionEvents[0];
  selectedPromotionEventKey = promotionEventKey(event);
  const categories = promotionCategoriesForEvent(event);
  if (!categories.includes(selectedPromotionCategory)) selectedPromotionCategory = categories[0] || 'Freedom Lab General';
  const rows = promotionPlatforms[selectedPromotionCategory] || [];
  const eventButtons = promotionEvents.map((ev) => {
    const key = promotionEventKey(ev);
    const active = key === selectedPromotionEventKey ? ' active' : '';
    return `<button class="promotion-event-button${active}" data-promotion-event-key="${escapeXml(key)}" type="button">${escapeXml(ev.label)}<small>${escapeXml(ev.date)} · ${escapeXml(ev.category || 'General')}</small></button>`;
  }).join('');
  const categoryTabs = categories.map(category => `<button class="promotion-category-tab${category === selectedPromotionCategory ? ' active' : ''}" data-promotion-category="${escapeXml(category)}" type="button">${escapeXml(category)}</button>`).join('');
  const tableRows = rows.map(platform => {
    const manualKey = promotionStorageKey(event, selectedPromotionCategory, platform.id, 'manual');
    const hermesKey = promotionStorageKey(event, selectedPromotionCategory, platform.id, 'hermes');
    const manualChecked = localStorage.getItem(manualKey) === '1' ? ' checked' : '';
    const hermesChecked = localStorage.getItem(hermesKey) === '1' ? ' checked' : '';
    const href = platform.url || '#';
    return `<tr><td><a href="${escapeXml(href)}" target="_blank" rel="noreferrer">${escapeXml(platform.label)}</a></td><td><input class="promotion-check" type="checkbox" data-promotion-key="${escapeXml(manualKey)}"${manualChecked} aria-label="Manually promoted on ${escapeXml(platform.label)}"></td><td><input class="promotion-check" type="checkbox" data-promotion-key="${escapeXml(hermesKey)}"${hermesChecked} aria-label="Hermes promoted on ${escapeXml(platform.label)}"></td></tr>`;
  }).join('');
  container.innerHTML = `<div class="promotion-layout"><aside class="promotion-event-list">${eventButtons}</aside><section class="promotion-detail-card"><div class="promotion-head"><div><div class="promotion-title">${escapeXml(event.label)}</div><div class="promotion-subtitle">${escapeXml(event.date)} · ${escapeXml(event.category || 'General')} · RSVP ${event.rsvp || 0}</div></div><div class="promotion-category-tabs">${categoryTabs}</div></div>${rows.length ? `<table class="promotion-table"><thead><tr><th>Platform</th><th>Manually posted?</th><th>Hermes posted?</th></tr></thead><tbody>${tableRows}</tbody></table>` : '<div class="promotion-empty">No promotion platforms configured for this category yet.</div>'}</section></div>`;
  container.querySelectorAll('[data-promotion-event-key]').forEach(button => {
    button.onclick = () => {
      selectedPromotionEventKey = button.dataset.promotionEventKey;
      localStorage.setItem('freedomLabPromotionEventKey', selectedPromotionEventKey);
      selectedPromotionCategory = '';
      renderPromotionDashboard();
    };
  });
  container.querySelectorAll('[data-promotion-category]').forEach(button => {
    button.onclick = () => {
      selectedPromotionCategory = button.dataset.promotionCategory;
      localStorage.setItem('freedomLabPromotionCategory', selectedPromotionCategory);
      renderPromotionDashboard();
    };
  });
  container.querySelectorAll('.promotion-check').forEach(box => {
    box.onchange = () => localStorage.setItem(box.dataset.promotionKey, box.checked ? '1' : '0');
  });
}

  document.querySelectorAll('.attendee-view-toggle[data-view]').forEach(button => {
    button.onclick = () => {
      attendeeChartView = button.dataset.view;
      localStorage.setItem('freedomLabAttendeeChartView', attendeeChartView);
      activateDashboardView('attendeePanel');
      renderAttendeeChart();
      attachAttendeeInteractions();
    };
  });
  setMainToggleState(document.getElementById('eventPanel').classList.contains('hidden') ? 'attendeePanel' : 'eventPanel');
}

function setupDashboardViewToggle() {
  const eventToggle = document.getElementById('eventMetricsToggle');
  const promotionToggle = document.getElementById('eventPromotionToggle');
  eventToggle.onclick = () => activateDashboardView('eventPanel');
  promotionToggle.onclick = () => activateDashboardView('promotionPanel');
  const savedView = localStorage.getItem('freedomLabDashboardView') || localStorage.getItem('freedomLabActiveTab');
  activateDashboardView(['eventPanel', 'promotionPanel'].includes(savedView) ? savedView : 'attendeePanel');
}

renderLastUpdated();
renderChart(events);
renderAttendeeChart();
attachAttendeeInteractions();
setupAttendeeViewToggles();
setupDashboardViewToggle();
</script>
