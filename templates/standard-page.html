<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{description}}">
    <title>{{title}} | Freedom Lab NYC</title>
    <!-- Canonical / SEO -->
    <link rel="canonical" href="https://freedomlab.nyc/templates/standard-page.html">

    <link rel="canonical" href="https://freedomlab.nyc/{{slug}}/">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="../css/styles.css?v={{css_version}}">
    <link rel="preload" href="../static/fonts/press-start-2p-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="../static/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="../css/fonts.css">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://freedomlab.nyc/templates/standard-page.html">
    <meta property="og:title" content="{{title}} | Freedom Lab NYC">
    <meta property="og:description" content="{{description}}">
    <meta property="og:image" content="https://freedomlab.nyc/static/img/FL%20Signature%20Rectangular2.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{title}} | Freedom Lab NYC">
    <meta name="twitter:description" content="{{description}}">
    <meta name="twitter:image" content="https://freedomlab.nyc/static/img/FL%20Signature%20Rectangular2.png">

    <!-- Freedom Lab structured data (generated by scripts/apply-seo.py) -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "@id": "https://freedomlab.nyc/templates/standard-page.html#webpage",
  "name": "{{title}} | Freedom Lab NYC",
  "description": "{{description}}",
  "url": "https://freedomlab.nyc/templates/standard-page.html",
  "publisher": {
    "@id": "https://freedomlab.nyc/#organization"
  }
}
</script>
</head>
<body>
    <header class="site-header">
        <a href="../" class="logo" aria-label="Freedom Lab NYC home">
            <picture>
                <source srcset="../static/img/fl-logo.webp" type="image/webp">
                <img src="../static/img/fl-logo.png" alt="Freedom Lab NYC">
            </picture>
        </a>
        <nav class="main-nav">
            <a href="../classes-events/">Classes & Events</a>
            <a href="../resources/">Resources</a>
            <a href="../contact/">Contact</a>
            <a href="../donate/">Donate</a>
            <a href="../join/" class="btn btn-primary">Join</a>
        </nav>
        <button class="mobile-menu-toggle" aria-label="Toggle mobile menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <main class="standard-page">
        <section class="page-hero">
            <h1>{{title}}</h1>
            {{helper_paragraph}}
        </section>

        <section class="standard-content-section">
            <div class="standard-content-card">
                {{body_html}}
            </div>
        </section>
    </main>

    <script src="../js/footer.js" defer></script>
    <script src="../js/main.js" defer></script>
</body>
</html>
