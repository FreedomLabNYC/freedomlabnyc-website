<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Freedom Lab NYC classes and events - hands-on workshops, community meetups, and Freedom Tech education in New York City. View our upcoming calendar.">
    <title>Classes & Events | Freedom Lab NYC</title>
    <link rel="icon" href="../static/img/torch transparent icocrop2.png" type="image/png">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preload" href="../static/fonts/press-start-2p-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="../static/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/classes.css">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://freedomlab.nyc/classes-events/">
    <meta property="og:title" content="Classes & Events | Freedom Lab NYC">
    <meta property="og:description" content="Hands-on workshops, community meetups, and freedom tech education in NYC.">
    <meta property="og:image" content="https://freedomlab.nyc/static/img/Freedom%20Lab%20NYC%20Logo%20-%20Circle.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Classes & Events | Freedom Lab NYC">
    <meta name="twitter:description" content="Hands-on workshops, community meetups, and freedom tech education in NYC.">
    <meta name="twitter:image" content="https://freedomlab.nyc/static/img/Freedom%20Lab%20NYC%20Logo%20-%20Circle.png">
</head>
<body>
    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
    
    <!-- Header -->
    <header class="header">
        <a href="/" class="logo">
            <picture>
                <source srcset="../static/img/FLNYC 2LINE+LOGO.webp" type="image/webp">
                <picture>
                <source srcset="../static/img/FLNYC 2LINE+LOGO.webp" type="image/webp">
                <img src="../static/img/FLNYC 2LINE+LOGO.png" alt="Freedom Lab NYC" class="logo-wide">
            </picture>
            </picture>
        </a>
        <nav class="nav-menu" id="navMenu">
            <a href="/classes-events/" class="nav-link active">Classes & Events</a>
            <a href="/resources/" class="nav-link">Resources</a>
            
            <a href="/contact/" class="nav-link">Contact</a>
            <a href="/donate/" class="nav-link">Donate</a>
            <a href="/join/" class="nav-btn">Join</a>
            
        </nav>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="classes-content">
        <!-- Hero Section -->
        <section class="classes-hero">
            <div class="classes-hero-content">
                <h1>Classes & Events</h1>
            </div>
        </section>

        <!-- Neon Glow Frame Calendar -->
        <section class="embed-section">
            <div class="neon-embed-container">
                <div class="neon-header">
                    <span class="neon-icon">⚡</span>
                    <h2>Upcoming Events</h2>
                    <span class="neon-icon">⚡</span>
                </div>
                
                <div class="neon-frame">
                    <div class="iframe-wrapper">
                        <!-- Loading Shimmer -->
                        <div class="embed-loading" id="embedLoading">
                            <div class="shimmer-line shimmer-title"></div>
                            <div class="shimmer-line shimmer-date"></div>
                            <div class="shimmer-card"></div>
                            <div class="shimmer-card"></div>
                            <div class="shimmer-card"></div>
                        </div>
                        <iframe
                            id="lumaEmbed"
                            src="https://lu.ma/embed/calendar/cal-ZGCxlwslp1K0wqD/events"
                            width="100%"
                            height="550"
                            frameborder="0"
                            loading="lazy"
                            allowfullscreen=""
                            aria-hidden="false"
                            tabindex="0"
                            onload="document.getElementById('embedLoading').style.display='none'; this.classList.add('loaded');"
                        ></iframe>
                    </div>
                </div>
                
                <div class="neon-footer">
                    <span class="neon-pulse"></span>
                    <span>Live from NYC</span>
                    <span class="neon-pulse"></span>
                </div>
            </div>
        </section>

        <!-- Event Links -->
        <section class="past-events-section">
            <div class="event-links-row">
                <a href="https://luma.com/freedomlab" target="_blank" class="past-events-link view-luma-link">
                    <img src="../static/img/luma_logo.png" alt="Luma" class="luma-icon-img">
                    <span>View on Luma</span>
                </a>
                <a href="https://luma.com/freedomlab?period=past" target="_blank" class="past-events-link">
                    <img src="../static/img/time-past.png" alt="Past Events" class="past-events-icon-img">
                    <span>View Past Events</span>
                </a>
            </div>
        </section>

        <!-- Event Archive -->
        <section class="event-archive-section">
            <div class="event-archive-container">
                <div class="event-archive-header">
                    <h2>Event Archive</h2>
                </div>
                <div class="event-cards-grid" id="eventCards">
                    <!-- Loading state -->
                    <div class="event-cards-loading">
                        <div class="event-card-skeleton"></div>
                        <div class="event-card-skeleton"></div>
                        <div class="event-card-skeleton"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer (loaded from js/footer.js) -->
    <div id="footer-placeholder"></div>
    <script src="../js/footer.js"></script>

    <script>
        // Mobile Menu Toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        const mobileOverlay = document.getElementById('mobileOverlay');
        
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
            mobileOverlay.classList.toggle('active');
            document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
        });
        
        mobileOverlay.addEventListener('click', () => {
            hamburger.classList.remove('active');
            navMenu.classList.remove('active');
            mobileOverlay.classList.remove('active');
            document.body.style.overflow = '';
        });
        
        document.querySelectorAll('.nav-link, .nav-btn').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
                mobileOverlay.classList.remove('active');
                document.body.style.overflow = '';
            });
        });
    </script>
    <script>
        // Load event archive from JSON (updated by GitHub Action)
        (async function loadEventArchive() {
            const container = document.getElementById('eventCards');
            try {
                const res = await fetch('events.json');
                if (!res.ok) throw new Error('Failed to load events');
                const data = await res.json();
                
                if (!data.events || data.events.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;">No past events yet.</p>';
                    return;
                }
                
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                
                container.innerHTML = data.events.map(ev => {
                    const d = new Date(ev.date);
                    const dateStr = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
                    const coverHtml = ev.cover 
                        ? `<img src="${ev.cover}" alt="${ev.name}" class="event-card-img" loading="lazy">` 
                        : '';
                    const innerHtml = `
                        <div class="event-card-cover">${coverHtml}</div>
                        <div class="event-card-body">
                            <span class="event-card-date">${dateStr}</span>
                            <h3 class="event-card-title">${ev.name}</h3>
                        </div>
                    `;
                    return ev.url
                        ? `<a href="${ev.url}" target="_blank" rel="noopener" class="event-card">${innerHtml}</a>`
                        : `<article class="event-card">${innerHtml}</article>`;
                }).join('');
                
            } catch (err) {
                console.error('Event archive load failed:', err);
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;">Could not load event archive.</p>';
            }
        })();
    </script>
    <script src="../js/social-config.js"></script>
</body>
</html>
